on: pull_request

concurrency: 
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Linting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Linting
              run: npx tsx --tsconfig ./tsconfig.json scripts/run-changed.ts --script \"npx eslint\" --extension \"js,jsx,ts,tsx\" --branch ${{ github.base_ref }}

    format:
        name: Formating
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Formating
              run: npx tsx --tsconfig ./tsconfig.json scripts/run-changed.ts --script \"npx prettier --check\" --extension \"json,md,mdx\" --branch ${{ github.base_ref }}

    package_json_exports_check:
        name: Package json exports check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Checking
              run: npm run package-json-exports-check

    module_exports_files_check:
        name: Module exports files check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Checking
              run: npm run module-exports-files-check

    check:
        name: Checking
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Checking
              run: npm run check

    test:
        name: Testing
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Fetch Base Branch
              run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

            - name: Install Node js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ secrets.NODE_VERSION }}

            - name: Install Dependencies
              run: npm ci

            - name: Testing
              run: npx vitest --run --changed ${{ github.base_ref }} --passWithNoTests
